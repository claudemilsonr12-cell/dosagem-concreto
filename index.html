<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistema de Dosagem de Concreto</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            padding: 10px;
        }

        .container {
            max-width: 1400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
        }

        h1 {
            text-align: center;
            margin-bottom: 5px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #444;
        }

        .cabecalho {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 900px;
            border-collapse: collapse;
        }

        th {
            background: #1e3a5f;
            color: white;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        .corrigida {
            font-weight: bold;
        }

        .botoes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }

        .btn-add {
            background: #198754;
            color: white;
        }

        .btn-calc {
            background: #0d6efd;
            color: white;
        }

        .btn-print {
            background: #6c757d;
            color: white;
        }

        .btn-remover {
            background: #dc3545;
            color: white;
            width: 100%;
        }

        #resultado {
            margin-top: 25px;
        }

        @media print {

            .botoes,
            .btn-remover {
                display: none;
            }

            body {
                background: white;
            }

            .container {
                box-shadow: none;
                padding: 0;
            }

        }
    </style>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#1e3a5f">
</head>

<body>

    <div class="container">

        <!--h1>MILROS VAREJO</h1-->
        <h2>Sistema de Dosagem de Concreto</h2>

        <div class="cabecalho">

            <div>
                <label>Dosagem</label>
                <input type="text" id="dosagem" value="TCCVVO-007">
            </div>

            <div>
                <label>Resistência</label>
                <input type="text" id="resistencia" value="10 MPa">
            </div>

            <div>
                <label>Data</label>
                <input type="date" id="data">
            </div>

            <div>
                <label>Volume (m³)</label>
                <input type="number" id="volume" value="1" min="0.1" step="0.1">
            </div>

        </div>

        <div class="table-container">

            <table id="tabelaMateriais">

                <thead>
                    <tr>
                        <th>Material</th>
                        <th>Massa S.S.S (kg)</th>
                        <th>Umidade (%)</th>
                        <th>Absorção (%)</th>
                        <th>Massa Corrigida (kg)</th>
                        <th>Ação</th>
                    </tr>
                </thead>

                <tbody>

                    <tr>
                        <td><input type="text" class="material" value="Brita 1"></td>
                        <td><input type="number" class="massa" value="1190"></td>
                        <td><input type="number" class="umidade" value="0.5"></td>
                        <td><input type="number" class="absorcao" value="0.5"></td>
                        <td class="corrigida">1190.00</td>
                        <td><button class="btn-remover" onclick="removerLinha(this)">Excluir</button></td>
                    </tr>

                    <tr>
                        <td><input type="text" class="material" value="Areia Natural"></td>
                        <td><input type="number" class="massa" value="924"></td>
                        <td><input type="number" class="umidade" value="5.0"></td>
                        <td><input type="number" class="absorcao" value="0.8"></td>
                        <td class="corrigida">962.81</td>
                        <td><button class="btn-remover" onclick="removerLinha(this)">Excluir</button></td>
                    </tr>

                    <tr>
                        <td><input type="text" class="material" value="Cimento"></td>
                        <td><input type="number" class="massa" value="205"></td>
                        <td><input type="number" class="umidade" value="0"></td>
                        <td><input type="number" class="absorcao" value="0"></td>
                        <td class="corrigida">205.00</td>
                        <td><button class="btn-remover" onclick="removerLinha(this)">Excluir</button></td>
                    </tr>

                    <tr>
                        <td><input type="text" class="material" value="Água"></td>
                        <td><input type="number" class="massa" value="176"></td>
                        <td><input type="number" class="umidade" value="0"></td>
                        <td><input type="number" class="absorcao" value="0"></td>
                        <td class="corrigida">176.00</td>
                        <td><button class="btn-remover" onclick="removerLinha(this)">Excluir</button></td>
                    </tr>

                    <tr>
                        <td><input type="text" class="material" value="Aditivo"></td>
                        <td><input type="number" class="massa" value="1.84"></td>
                        <td><input type="number" class="umidade" value="0"></td>
                        <td><input type="number" class="absorcao" value="0"></td>
                        <td class="corrigida">1.84.00</td>
                        <td><button class="btn-remover" onclick="removerLinha(this)">Excluir</button></td>
                    </tr>

                </tbody>

            </table>

        </div>

        <div class="botoes">

            <button class="btn-add" onclick="adicionarLinha()">
                ➕ Adicionar Material
            </button>

            <button class="btn-calc" onclick="calcular()">
                🧮 Calcular
            </button>

            <button class="btn-print" onclick="window.print()">
                🖨 Imprimir
            </button>

        </div>

        <div id="resultado">

            <h2>Produção Total</h2>

            <div class="table-container">

                <table>

                    <thead>
                        <tr>
                            <th>Material</th>
                            <th>Total Produção (kg)</th>
                        </tr>
                    </thead>

                    <tbody id="resultadoBody">
                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script>

        document.getElementById("data").value =
            new Date().toISOString().split("T")[0];

        function adicionarLinha() {

            const tbody =
                document.querySelector("#tabelaMateriais tbody");

            const tr =
                document.createElement("tr");

            tr.innerHTML = `
<td><input type="text" class="material"></td>
<td><input type="number" class="massa" value="0"></td>
<td><input type="number" class="umidade" value="0"></td>
<td><input type="number" class="absorcao" value="0"></td>
<td class="corrigida">0.00</td>
<td>
<button class="btn-remover" onclick="removerLinha(this)">
Excluir
</button>
</td>
`;

            tbody.appendChild(tr);

        }

        function removerLinha(botao) {

            const linha = botao.closest("tr");

            linha.remove();

            calcular();

        }
        function calcular() {

            const volume =
                parseFloat(document.getElementById("volume").value) || 1;

            const linhas =
                document.querySelectorAll("#tabelaMateriais tbody tr");

            const resultado =
                document.getElementById("resultadoBody");

            resultado.innerHTML = "";

            let aguaProjeto = 0;
            let correcaoTotal = 0;

            linhas.forEach(linha => {

                const material =
                    linha.querySelector(".material").value;

                const massa =
                    parseFloat(linha.querySelector(".massa").value) || 0;

                const umidade =
                    parseFloat(linha.querySelector(".umidade").value) || 0;

                const absorcao =
                    parseFloat(linha.querySelector(".absorcao").value) || 0;

                const nome =
                    material.toLowerCase();

                if (nome.includes("água") || nome.includes("agua")) {

                    aguaProjeto = massa;

                    linha.querySelector(".corrigida")
                        .textContent = massa.toFixed(2);

                } else {

                    const correcao =
                        ((umidade - absorcao) * massa) / 100;

                    const massaCorrigida =
                        massa + correcao;

                    linha.querySelector(".corrigida")
                        .textContent = massaCorrigida.toFixed(2);

                    correcaoTotal += correcao;

                }

            });

            let aguaCorrigida =
                aguaProjeto - correcaoTotal;

            if (aguaCorrigida < 0) {
                aguaCorrigida = 0;
            }

            linhas.forEach(linha => {

                const material =
                    linha.querySelector(".material")
                        .value
                        .toLowerCase();

                const massa =
                    parseFloat(
                        linha.querySelector(".massa").value
                    ) || 0;

                let valorFinal;

                if (material.includes("água") ||
                    material.includes("agua")) {

                    valorFinal = aguaCorrigida;

                    linha.querySelector(".corrigida")
                        .textContent =
                        aguaCorrigida.toFixed(2);

                } else {

                    const umidade =
                        parseFloat(
                            linha.querySelector(".umidade").value
                        ) || 0;

                    const absorcao =
                        parseFloat(
                            linha.querySelector(".absorcao").value
                        ) || 0;

                    const correcao =
                        ((umidade - absorcao) * massa) / 100;

                    valorFinal =
                        massa + correcao;

                }

                resultado.innerHTML += `
        <tr>
            <td>${linha.querySelector(".material").value}</td>
            <td>${(valorFinal * volume).toFixed(2)}</td>
        </tr>
        `;

            });

        }

        document.addEventListener("input", function (e) {

            if (
                e.target.classList.contains("massa") ||
                e.target.classList.contains("umidade") ||
                e.target.classList.contains("absorcao") ||
                e.target.classList.contains("material") ||
                e.target.id === "volume"
            ) {
                calcular();
            }

        });

        calcular();



        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js")
                .then(() => console.log("PWA i    "))
            ch(err => console.log(err));
        }


    </script>

</body>

</html>
